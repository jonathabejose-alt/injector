name: Automated EXE Compiler

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pymem Pillow pyinstaller

    - name: Build Standalone EXE with PyInstaller
      run: |
        pyinstaller --clean --onefile --noconsole --uac-admin --icon="cr.ico" --name="SacredWare" --add-data "core;core" --add-data "ui;ui" --add-data "config;config" --add-data "offsets;offsets" --add-data "cr.ico;." main.py

    - name: Upload Binary to Github Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SacredWare.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Read JSON File
      id: read_json
      run: |
        $json = Get-Content -Path version.json -Raw
        echo "data=$json" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Discord Notification
      uses: sarisia/actions-status-discord@v1
      if: always()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        nodetail: true
        title: ${{ fromJson(steps.read_json.outputs.data).title }}
        description: ${{ fromJson(steps.read_json.outputs.data).description }}
        color: ${{ fromJson(steps.read_json.outputs.data).color }}
