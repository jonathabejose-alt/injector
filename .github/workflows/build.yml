name: Automated EXE Compiler

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pymem Pillow pyinstaller

    - name: Build Standalone EXE with PyInstaller
      run: |
        pyinstaller --clean --onefile --noconsole --uac-admin --icon="cr.ico" --name="SacredWare" --add-data "core;core" --add-data "ui;ui" --add-data "config;config" --add-data "offsets;offsets" --add-data "cr.ico;." main.py

    - name: Upload Binary to Github Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SacredWare.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Get Release Description
      id: get_release
      run: |
        $url = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
        $release = Invoke-RestMethod -Uri $url -Headers @{Authorization="Bearer ${{ secrets.GITHUB_TOKEN }}"}
        $body = $release.body -replace '`', '\`' -replace '"', '\"'
        echo "body=$body" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Discord Notification
      uses: sarisia/actions-status-discord@v1
      if: always()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: ""
        description: |
          **SacredWare ${{ github.ref_name }}** @everyone <@&1483491294847439058>
          ${{ steps.get_release.outputs.body }}
          Re-Launch the Updater or download from here: [Download](https://github.com/jonathabejose-alt/SacredWare-Installer/releases/latest/download/SacredWare_Installer.exe)
        color: 0x41cd52
        username: "SacredWare"
