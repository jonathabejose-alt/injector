name: Automated EXE Compiler

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pymem Pillow pyinstaller

    - name: Build Standalone EXE
      run: |
        pyinstaller --clean --onefile --noconsole --uac-admin --icon="cr.ico" --name="SacredWare" --add-data "core;core" --add-data "ui;ui" --add-data "config;config" --add-data "offsets;offsets" --add-data "cr.ico;." main.py

    - name: Create or Update Release
      run: |
        # Verificar si el release ya existe
        if gh release view ${{ github.ref_name }} --repo ${{ github.repository }} 2>$null; then
          echo "Release ${{ github.ref_name }} already exists, uploading file only..."
          gh release upload ${{ github.ref_name }} dist/SacredWare.exe --clobber --repo ${{ github.repository }}
        else
          echo "Creating new release ${{ github.ref_name }}..."
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" --repo ${{ github.repository }}
          gh release upload ${{ github.ref_name }} dist/SacredWare.exe --clobber --repo ${{ github.repository }}
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Get Tag Message
      id: tag
      run: |
        $msg = git tag -l --format='%(contents:body)' ${{ github.ref_name }}
        if (-not $msg) { $msg = "No description provided." }
        "message=$msg" >> $env:GITHUB_OUTPUT
      shell: pwsh
